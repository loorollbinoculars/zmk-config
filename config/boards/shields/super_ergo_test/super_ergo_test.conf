CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Disable ZMK status LED blinking and BT radio debug pin toggling
CONFIG_ZMK_BATTERY_LEVEL_INDICATOR=n
CONFIG_BT_CTLR_DEBUG_PINS=n

# Uncomment to enable the display
# CONFIG_ZMK_DISPLAY=y
